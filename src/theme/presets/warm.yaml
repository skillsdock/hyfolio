# Warm — Soft tones, rounded corners, serif headings, friendly feel
# Great for hospitality, wellness, creative agencies, personal brands

colors:
  background: "#faf8f5"
  foreground: "#1c1917"
  primary: "#b45309"
  primary-foreground: "#ffffff"
  secondary: "#f5f0eb"
  secondary-foreground: "#292524"
  muted: "#f5f0eb"
  muted-foreground: "#78716c"
  accent: "#fef3c7"
  destructive: "#dc2626"
  border: "#e7e0d8"
  ring: "#b45309"

typography:
  fonts:
    heading: Playfair Display
    body: Source Sans 3
    mono: JetBrains Mono
  scale:
    xs: 0.75rem
    sm: 0.875rem
    base: 1rem
    lg: 1.125rem
    xl: 1.25rem
    2xl: 1.5rem
    3xl: 1.875rem
    4xl: 2.25rem
    5xl: 3rem
    6xl: 3.75rem
  headings:
    h1: { size: 5xl, weight: 700, tracking: normal }
    h2: { size: 4xl, weight: 700, tracking: normal }
    h3: { size: 2xl, weight: 600 }
    h4: { size: xl, weight: 600 }
    h5: { size: lg, weight: 600 }
    h6: { size: base, weight: 600 }
  line-height:
    tight: 1.25
    normal: 1.6
    relaxed: 1.8
  letter-spacing:
    tight: -0.015em
    normal: "0"
    wide: 0.04em

spacing:
  section-padding: 6rem
  container-max: 1100px
  container-padding: 1.5rem

radius:
  sm: 0.375rem
  md: 0.5rem
  lg: 0.75rem
  xl: 1rem
  2xl: 1.5rem
  full: 9999px

shadows:
  sm: "0 1px 2px 0 rgb(28 25 23 / 0.04)"
  md: "0 4px 6px -1px rgb(28 25 23 / 0.07)"
  lg: "0 10px 15px -3px rgb(28 25 23 / 0.07)"
  xl: "0 20px 25px -5px rgb(28 25 23 / 0.08)"

transitions:
  fast: 200ms
  normal: 300ms
  slow: 500ms
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"

buttons:
  radius: lg
  font-weight: 500
  padding: { x: 1.5rem, y: 0.75rem }
  font-size: sm
  primary:
    background: primary
    foreground: primary-foreground
  secondary:
    background: secondary
    foreground: secondary-foreground
  outline:
    border: border
  ghost:
    hover-background: accent

cards:
  radius: xl
  padding: 1.75rem
  shadow: sm
  border: true

forms:
  input-radius: lg
  input-padding: { x: 1rem, y: 0.75rem }
  input-border: true
  focus-ring-width: 2px
  focus-ring-color: ring

loaders:
  color: primary
  size: 1.5rem
  border-width: 2px
  speed: 1s
  page-loader:
    background: background
    style: dots

badges:
  radius: full
  padding: { x: 0.75rem, y: 0.25rem }
  font-size: xs
  font-weight: 500

layout:
  default-text-align: left
  hero-text-align: center
  cta-text-align: center

dark:
  colors:
    background: "#1c1917"
    foreground: "#faf8f5"
    primary: "#d97706"
    primary-foreground: "#ffffff"
    secondary: "#292524"
    secondary-foreground: "#faf8f5"
    muted: "#292524"
    muted-foreground: "#a8a29e"
    accent: "#292524"
    destructive: "#dc2626"
    border: "#44403c"
    ring: "#d97706"
