# Bold — High contrast, strong colors, larger type, tighter spacing
# Great for startups, tech products, marketing-heavy sites

colors:
  background: "#ffffff"
  foreground: "#000000"
  primary: "#dc2626"
  primary-foreground: "#ffffff"
  secondary: "#1e1e1e"
  secondary-foreground: "#ffffff"
  muted: "#f0f0f0"
  muted-foreground: "#525252"
  accent: "#fef2f2"
  destructive: "#b91c1c"
  border: "#d4d4d4"
  ring: "#dc2626"

typography:
  fonts:
    heading: Inter
    body: Inter
    mono: JetBrains Mono
  scale:
    xs: 0.875rem
    sm: 1rem
    base: 1.125rem
    lg: 1.25rem
    xl: 1.5rem
    2xl: 1.875rem
    3xl: 2.25rem
    4xl: 3rem
    5xl: 3.75rem
    6xl: 4.5rem
  headings:
    h1: { size: 6xl, weight: 900, tracking: tight }
    h2: { size: 5xl, weight: 800, tracking: tight }
    h3: { size: 3xl, weight: 700 }
    h4: { size: 2xl, weight: 700 }
    h5: { size: xl, weight: 600 }
    h6: { size: lg, weight: 600 }
  line-height:
    tight: 1.1
    normal: 1.4
    relaxed: 1.6
  letter-spacing:
    tight: -0.03em
    normal: "0"
    wide: 0.05em

spacing:
  section-padding: 5rem
  container-max: 1280px
  container-padding: 2rem

radius:
  sm: 0.125rem
  md: 0.25rem
  lg: 0.375rem
  xl: 0.5rem
  2xl: 0.75rem
  full: 9999px

shadows:
  sm: "0 1px 3px 0 rgb(0 0 0 / 0.1)"
  md: "0 4px 8px -1px rgb(0 0 0 / 0.15)"
  lg: "0 12px 20px -4px rgb(0 0 0 / 0.15)"
  xl: "0 24px 32px -8px rgb(0 0 0 / 0.2)"

transitions:
  fast: 100ms
  normal: 200ms
  slow: 350ms
  easing: "cubic-bezier(0.22, 1, 0.36, 1)"

buttons:
  radius: sm
  font-weight: 700
  padding: { x: 2rem, y: 0.875rem }
  font-size: base
  primary:
    background: primary
    foreground: primary-foreground
  secondary:
    background: secondary
    foreground: secondary-foreground
  outline:
    border: border
  ghost:
    hover-background: accent

cards:
  radius: md
  padding: 2rem
  shadow: md
  border: false

forms:
  input-radius: sm
  input-padding: { x: 1.25rem, y: 0.875rem }
  input-border: true
  focus-ring-width: 3px
  focus-ring-color: ring

loaders:
  color: primary
  size: 2rem
  border-width: 3px
  speed: 0.6s
  page-loader:
    background: background
    style: bar

badges:
  radius: sm
  padding: { x: 0.875rem, y: 0.375rem }
  font-size: sm
  font-weight: 700

layout:
  default-text-align: left
  hero-text-align: left
  cta-text-align: center

dark:
  colors:
    background: "#0a0a0a"
    foreground: "#ffffff"
    primary: "#ef4444"
    primary-foreground: "#ffffff"
    secondary: "#e5e5e5"
    secondary-foreground: "#0a0a0a"
    muted: "#1c1c1c"
    muted-foreground: "#a3a3a3"
    accent: "#1c1c1c"
    destructive: "#dc2626"
    border: "#404040"
    ring: "#ef4444"
